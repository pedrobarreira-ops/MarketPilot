# docker-compose.yml
# No top-level 'version:' key — deprecated in Docker Compose v2 (current standard).
# Use 'docker compose' (v2 CLI) not 'docker-compose' (v1 legacy).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # No port mapping — only accessible within Docker network

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      # Override .env values for Docker networking and production settings
      REDIS_URL: redis://redis:6379
      SQLITE_PATH: /data/marketpilot.db
      NODE_ENV: production
    volumes:
      - sqlite_data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
  sqlite_data:
